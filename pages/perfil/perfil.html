<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../CSS/estilosGERAL.css">
    <link rel="stylesheet" href="../../CSS/cssMARIANA.css">
</head>
<body>

<nav class="nav-fixa">
    <img src="../../assets/setaback1.png" class="nav-back" onclick="history.back()" style="cursor: pointer;"/>
    <div class="nav-logo">
        <img src="../../assets/logotipo.png" class="logo-icon"/>
    </div>

    <div class="top-profile-container">
        <img id="perfil-img-pequena" src="../../assets/voluntarioperfil.png" onerror="this.src='../../assets/voluntarioperfil.png';" alt="Perfil" class="top-profile-img">
        <div class="star-badge-small"><i class="fas fa-star"></i></div>
    </div>
</nav>

<main class="main-perfis">
    <div class="greeting">
        <h1 id="perfil-nome">Olá, Ariana Lopes</h1>
        <p>Voluntária ativa</p>
    </div>

    <div class="profile-card">
        <div class="large-profile-container">
            <img id="perfil-img-grande" src="../../assets/voluntarioperfil.png" onerror="this.src='../../assets/voluntarioperfil.png';" alt="Ariana" class="large-profile-img">
            <div class="star-badge-large"><i class="fas fa-star"></i></div>
        </div>

        <div class="stats-row">
            <span><i class="far fa-clock"></i> 120h</span>
            <div class="divider"></div>
            <span>30 projetos</span>
        </div>
        <hr class="stats-hr">
        <div class="stats-row">
            <span><i class="fas fa-star"></i> 120 pontos</span>
            <div class="divider"></div>
            <span id="perfil-cidade"><i class="fas fa-map-marker-alt"></i> Aveiro</span>
        </div>

        <p id="perfil-biografia" class="bio-text mt-3 mb-0">
            Olá, eu sou a Ariana, tenho 26 anos e desde pequena que tenho interesse em ajudar os outros.
        </p>
    </div>

    <div class="impact-card">
        <h2 class="impact-title">O teu impacto</h2>
        <div class="impact-grid">
            <div class="impact-pill">
                <img src="../../assets/arvore.png" alt="Árvore" style="width: 20px; height: 20px; margin-right: 8px;"> 35
            </div>
            <div class="impact-pill">
                <img src="../../assets/pessoas.png" alt="Pessoas" style="width: 20px; height: 20px; margin-right: 8px;"> 120
            </div>
            <div class="impact-pill">
                <img src="../../assets/dinheiro.png" alt="Dinheiro" style="width: 20px; height: 20px; margin-right: 8px;"> 500€
            </div>
        </div>
    </div>

    <div class="action-buttons-container">
        <a href="editarperfil.html" class="btn action-btn" style="display: flex; text-decoration: none;">
            <i class="far fa-edit"></i> Editar perfil
        </a>
        <button class="btn action-btn" onclick="acaoBotao('Notificações')">
            <i class="far fa-bell"></i> Notificações
        </button>
        <button class="btn action-btn" onclick="acaoBotao('Projetos')">
            <i class="far fa-user"></i> Projetos
        </button>
        <button class="btn action-btn" onclick="acaoBotao('Log out')">
            <i class="fas fa-sign-out-alt"></i> Log out
        </button>
    </div>
</main>

<nav style="position: fixed; bottom: 0; width: 100%; z-index: 999;">
    <img src="../../assets/projetos_bottombar1.png" />
    <img src="../../assets/instituicoes_bottombar1.png" />
    <img src="../../assets/homepage_bottombar1.png" />
    <img src="../../assets/forum_bottombar1.png" />
    <img src="../../assets/perfil_bottombar1.png"/>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/perfil.js"></script>
<script src="../../js/main.js"></script>
</body>
</html>
