    <link rel="stylesheet" href="../../CSS/cssMARIANA.css">
</head>
<body class="edit-profile-body">

<nav class="nav-fixav" style="background-color: #5B623A;">
    <img src="../../assets/setabackbranca1.png" class="nav-back" onclick="history.back()" style="cursor: pointer;"/>

    <div class="nav-logo">
        <img src="../../assets/logotipobranco.png" class="logo-icon"/>
    </div>

    <a href="perfil.html" class="top-profile-container" style="text-decoration: none; cursor: pointer;">
        <img id="perfil-img-pequena" src="../../assets/voluntarioperfil.png" onerror="this.src='../../assets/voluntarioperfil.png';" alt="Perfil" class="top-profile-img">
        <div class="star-badge-small"><i class="fas fa-star"></i></div>
    </a>
</nav>

<div class="edit-top-wrapper">
    <h1 class="page-title text-center pt-4 mb-0 pb-3">Editar Perfil</h1>
</div>

<main class="edit-main-card">

    <form class="edit-form" action="atualizar_perfil.php" method="POST" enctype="multipart/form-data">

        <div class="text-center">
            <label class="edit-photo-container" style="position: relative; cursor: pointer; margin-bottom: 20px; display: inline-block;">
                <input type="file" name="foto_perfil" id="input-foto" style="display: none;" accept="image/*">
                <img src="../../assets/voluntarioperfil.png" onerror="this.src='../../assets/voluntarioperfil.png';" alt="Ariana" class="edit-photo-img" id="preview-foto">
                <div class="camera-icon-badge">
                    <i class="fas fa-camera"></i>
                </div>
            </label>
        </div>

        <div class="mb-4">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control custom-input" id="nome" name="nome" value="Ariana Lopes">
        </div>

        <div class="mb-4">
            <label for="username" class="form-label">Nome de Utilizador</label>
            <input type="text" class="form-control custom-input" id="username" name="username" value="ariana123">
        </div>

        <div class="mb-4">
            <label for="biografia" class="form-label">Biografia</label>
            <textarea class="form-control custom-textarea" id="biografia" name="biografia" rows="4">Olá, eu sou a Ariana, tenho 26 anos e desde pequena que tenho interesse em ajudar os outros.</textarea>
        </div>

        <div class="mb-4">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control custom-input" id="email" name="email" value="arianalopes@gmail.com">
        </div>

        <div class="mb-4">
            <label for="telemovel" class="form-label">Número de Telemóvel</label>
            <input type="text" class="form-control custom-input" id="telemovel" name="telemovel" value="967546366">
        </div>

        <div class="mb-4">
            <label for="data_nascimento" class="form-label">Data de Nascimento</label>
            <input type="date" class="form-control custom-input" id="data_nascimento" name="data_nascimento" value="2001-04-20">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Cidade</label>
            <input type="text" id="cidade" name="cidade" class="form-control custom-input" placeholder="A tua cidade" value="Aveiro">
        </div>

        <div class="form-group mb-4">
            <label class="form-label" for="competencias">Competências</label>
            <textarea id="competencias" name="competencias" class="form-control custom-textarea" rows="2">Criatividade, Eficiência, Pontualidade, Flexibilidade...</textarea>
        </div>

        <div class="form-group mb-4">
            <label class="form-label">Interesses</label>

            <input type="hidden" name="interesses" id="interesses-hidden" value="">

            <div class="tags-container justify-content-center mb-3" id="interesses-container">
            </div>

            <div class="text-center">
                <button type="button" class="btn-ver-mais" id="btn-add-interesse">+ Adicionar interesse</button>

                <input type="text" id="input-novo-interesse" class="form-control custom-input mx-auto"
                       placeholder="Escreve e clica Enter..."
                       style="display: none; max-width: 250px; text-align: center;">
            </div>
        </div>

        <div class="text-center mt-5">
            <button type="submit" class="btn-guardar">Guardar alterações</button>
        </div>
    </form>
</main>

<nav style="position: fixed; bottom: 0; width: 100%; z-index: 999;">

</body>
</html>
