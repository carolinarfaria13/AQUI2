<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../CSS/estilosGERAL.css">
    <link rel="stylesheet" href="../../CSS/cssMARIANA.css">
</head>
<body class="edit-profile-body">

<nav class="nav-fixav" style="background-color: #5B623A;">
    <img src="../../assets/setabackbranca1.png" class="nav-back" onclick="history.back()" style="cursor: pointer;"/>

    <div class="nav-logo">
        <img src="../../assets/logotipobranco.png" class="logo-icon"/>
    </div>

    <a href="perfil.html" class="top-profile-container" style="text-decoration: none; cursor: pointer;">
        <img src="../../assets/voluntarioperfil.png" alt="Perfil" class="top-profile-img">
        <div class="star-badge-small"><i class="fas fa-star"></i></div>
    </a>
</nav>

<div class="edit-top-wrapper">
    <h1 class="page-title text-center pt-4 mb-0 pb-3">Editar Perfil</h1>
</div>

<main class="edit-main-card">

    <form class="edit-form" action="../php/atualizar_foto.php" method="POST" enctype="multipart/form-data">
        <div class="edit-photo-container" style="position: relative; cursor: pointer;">
            <input type="file" name="foto_perfil" id="input-foto" style="display: none;" accept="image/*">
            <img src="../../assets/voluntarioperfil.png" alt="Ariana" class="edit-photo-img" id="preview-foto">
            <div class="camera-icon-badge" onclick="document.getElementById('input-foto').click();">
                <i class="fas fa-camera"></i>
            </div>
        </div>
    </form>

    <form class="edit-form" action="../php/atualizar_perfil.php" method="POST" enctype="multipart/form-data">

        <div class="form-group mb-3">
            <label class="form-label">Nome</label>
            <input type="text" name="nome" class="form-control custom-input" placeholder="Ariana Lopes" value="Ariana Lopes">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Nome de Utilizador</label>
            <input type="text" name="username" class="form-control custom-input" placeholder="ariana123" value="ariana123">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Biografia</label>
            <textarea name="biografia" class="form-control custom-textarea" rows="4">Olá, eu sou a Ariana, tenho 26 anos e desde pequena que tenho interesse em ajudar os outros.</textarea>
        </div>

        <div class="form-group mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control custom-input" placeholder="ariana123@gmail.com" value="ariana123@gmail.com">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Número de Telemóvel</label>
            <input type="tel" name="telemovel" class="form-control custom-input" placeholder="O teu número" value="976556366">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Data de Nascimento</label>
            <input type="text" name="data_nascimento" class="form-control custom-input" placeholder="20/04/2000" value="20/04/2000">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Cidade</label>
            <input type="text" name="cidade" class="form-control custom-input" placeholder="Aveiro" value="Aveiro">
        </div>

        <div class="form-group mb-4">
            <label class="form-label">Competências</label>
            <textarea name="competencias" class="form-control custom-textarea" rows="2">Criatividade, Eficiência, Pontualidade, Flexibilidade...</textarea>
        </div>

        <div class="form-group mb-4">
            <label class="form-label">Interesses</label>

            <input type="hidden" name="interesses" id="interesses-hidden" value="Limpeza,Banco Alimentar,Natureza">

            <div class="tags-container justify-content-center mb-3" id="interesses-container">
                <span class="tag-pill">Limpeza</span>
                <span class="tag-pill">Banco Alimentar</span>
                <span class="tag-pill">Natureza</span>
            </div>

            <div class="text-center">
                <button type="button" class="btn-ver-mais" id="btn-add-interesse">+ Adicionar interesse</button>

                <input type="text" id="input-novo-interesse" class="form-control custom-input mx-auto"
                       placeholder="Escreve e clica Enter..."
                       style="display: none; max-width: 250px; text-align: center;">
            </div>
        </div>

        <div class="text-center mt-5">
            <button type="submit" class="btn-guardar">Guardar alterações</button>
        </div>
    </form>
</main>

<nav style="position: fixed; bottom: 0; width: 100%; z-index: 999;">
    <img src="../../assets/projetos_bottombar1.png" />
    <img src="../../assets/instituicoes_bottombar1.png" />
    <img src="../../assets/homepage_bottombar1.png" />
    <img src="../../assets/forum_bottombar1.png" />
    <img src="../../assets/perfil_bottombar1.png"/>
</nav>

<script src="../../js/editarperfil.js"></script>
</body>
</html>
