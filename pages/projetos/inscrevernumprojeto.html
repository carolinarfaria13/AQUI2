<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscrever em Projeto</title>

    <link rel="stylesheet" href="../../CSS/estilossergiacosta.css">
    <link rel="stylesheet" href="../../CSS/estilosgerais.css">
</head>

<body class="bodyinscreverprojeto">

<header class="headerinscreverprojeto">
    <img src="../../assets/setabackbranca1.png" class="nav-back" onclick="history.back()" style="cursor: pointer;"/>

    <div>
        <img src="../../assets/logotipobranco.png" class="logo-icon"/>
    </div>

    <a href="perfil.html" class="top-profile-container" style="text-decoration: none; cursor: pointer;">
        <img src="../../assets/voluntarioperfil.png" alt="Perfil" class="top-profile-img">
        <div class="star-badge-small"><i class="fas fa-star"></i></div>
    </a>
</header>

<!-- CONTEÚDO PRINCIPAL -->
<main class="maininstituicao">
    <form class="form">

        <div class="form">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Nome Completo" />
        </div>

        <div class="form">
            <label for="data">Data de nascimento</label>
            <input type="text" id="data" placeholder="dd/mm/aaaa" />
        </div>

        <div class="form">
            <label for="telemovel">Número de Telemóvel</label>
            <input type="tel" id="telemovel" placeholder="Número de Telemóvel" />
        </div>

        <div class="form">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="E-mail" />
        </div>

        <div class="form">
            <label for="localizacao">Localização</label>
            <input type="text" id="localizacao" placeholder="Localização Atual" />
        </div>

        <div class="form">
            <label for="motivacao">Motivação para participar no projeto</label>
            <textarea id="motivacao" placeholder="Motivação..."></textarea>
        </div>

        <button type="button" class="btninscreverprojeto">Inscrever</button>

    </form>
</main>

<!-- BOTTOM NAV -->
<nav>
    <img src="../../assets/projetos_bottombar1.png" />
    <img src="../../assets/instituicoes_bottombar1.png" />
    <img src="../../assets/homepage_bottombar1.png" />
    <img src="../../assets/forum_bottombar1.png" />
    <img src="../../assets/perfil_bottombar1.png"/>
</nav>

</body>
</html>
