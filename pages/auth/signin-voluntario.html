    <div class="signin-body">
      <svg class="avatar" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><clipPath id="ac-lg"><circle cx="45" cy="45" r="45"/></clipPath></defs>
        <circle cx="45" cy="45" r="45" fill="#8fa882"/>
        <g clip-path="url(#ac-lg)" fill="#c8d4bc">
          <circle cx="45" cy="31" r="14"/>
          <circle cx="45" cy="80" r="34"/>
        </g>
      </svg>

      <h1 class="title-signin">Sign In</h1>
      <p class="subtitle-signin">como VOLUNTÁRIO</p>

      <div class="form">
        <label class="field-label" for="nome">Nome*</label>
        <div class="input-wrap">
          <input type="text" id="nome" placeholder="Insira o seu nome" />
        </div>
        <span class="error-msg" id="err-nome">Campo obrigatório.</span>

        <label class="field-label" for="telemovel">Nº de telemóvel*</label>
        <div class="input-wrap">
          <input type="tel" id="telemovel" placeholder="Insira o seu nº de telemóvel" />
        </div>
        <span class="error-msg" id="err-telemovel">Campo obrigatório.</span>

        <label class="field-label" for="nascimento">Data de Nascimento*</label>
        <div class="input-wrap">
          <input type="text" id="nascimento" placeholder="dd/mm/aaaa" inputmode="numeric" maxlength="10" />
        </div>
        <span class="error-msg" id="err-nascimento">Campo obrigatório.</span>

        <label class="field-label" for="cidade">Cidade</label>
        <div class="input-wrap">
          <input type="text" id="cidade" placeholder="Insira a sua cidade" />
        </div>

        <label class="field-label" for="bio">Biografia</label>
        <textarea id="bio" class="textarea" placeholder="Insira uma biografia ao seu perfil" rows="4"></textarea>

        <label class="field-label" for="competencias">Competências*</label>
        <div class="input-wrap">
          <input type="text" id="competencias" placeholder="Insira as suas competências" />
        </div>
        <span class="error-msg" id="err-competencias">Campo obrigatório.</span>

        <label class="field-label">Interesses</label>
        <div class="tags-wrap" id="interesses-wrap">
          <span class="tag">Limpeza</span>
          <span class="tag">Banco Alimentar</span>
          <span class="tag">Natureza</span>
          <button class="tag-add" type="button" id="btn-add-interesse">+ Adicionar interesse</button>
        </div>

        <label class="field-label" for="email">E-mail*</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="Insira o seu e-mail" />
        </div>
        <span class="error-msg" id="err-email">Campo obrigatório.</span>

        <label class="field-label" for="password">Password*</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Insira uma password" />
        </div>
        <span class="error-msg" id="err-password">Campo obrigatório.</span>

        <label class="field-label" for="username">Nome de Utilizador*</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="Insira um nome de utilizador" />
        </div>
        <span class="error-msg" id="err-username">Campo obrigatório.</span>
      </div>

      <button class="btn btn-short btn-main" type="button" onclick="validarFormulario()">Criar Conta</button>

      <p class="back-link">
        <a href="../../index.html">← Voltar ao início</a>
      </p>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-interesse">
  <div class="modal-card">
    <p class="modal-titulo">Novo interesse</p>
    <input type="text" class="modal-input" id="input-novo-interesse" placeholder="Ex: Animais" />
    <span class="error-msg" id="err-novo-interesse">Só são permitidas letras.</span>
    <div class="modal-botoes">
      <button type="button" class="btn-modal btn-modal-cancelar" id="btn-cancelar-interesse">Cancelar</button>
      <button type="button" class="btn-modal btn-modal-confirmar" id="btn-confirmar-interesse">Adicionar</button>
    </div>
  </div>
</div>

<script src="../../js/signin-voluntario.js"></script>
</body>
</html>
