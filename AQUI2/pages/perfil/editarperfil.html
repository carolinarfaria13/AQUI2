<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Perfil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../CSS/estilosGERAL.css">
    <link rel="stylesheet" href="../../CSS/cssMARIANA.css">
</head>
<body class="edit-profile-body">

<div class="edit-top-wrapper">
    <nav style="background-color: #5B623A; padding-top: 16px;">
        <img src="../../assets/setaback.png" class="nav-back" onclick="history.back()" style="cursor: pointer;"/>

        <div class="nav-logo">
            <img src="../../assets/logotipo.png" class="logo-icon"/>
        </div>

        <div class="top-profile-container">
            <img src="../../imgs/voluntarioperfil.png" alt="Perfil" class="top-profile-img">
            <div class="star-badge-small"><i class="fas fa-star"></i></div>
        </div>
    </nav>

    <div class="edit-top-wrapper">
        <h1 class="page-title text-center text-white mt-1 mb-0 pb-3">Editar Perfil</h1>
    </div>

<main class="edit-main-card">

    <div class="edit-photo-container">
        <img src="../../imgs/voluntarioperfil.png" alt="Ariana" class="edit-photo-img">
        <div class="camera-icon-badge">
            <i class="fas fa-camera"></i>
        </div>
    </div>

    <form class="edit-form">
        <div class="form-group mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control custom-input" placeholder="Ariana Lopes" value="Ariana Lopes">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Nome de Utilizador</label>
            <input type="text" class="form-control custom-input" placeholder="ariana123" value="ariana123">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Biografia</label>
            <textarea class="form-control custom-textarea" rows="4">Olá, eu sou a Ariana, tenho 26 anos e desde pequena que tenho interesse em ajudar os outros.</textarea>
        </div>

        <div class="form-group mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control custom-input" placeholder="ariana123@gmail.com" value="ariana123@gmail.com">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Número de Telemóvel</label>
            <input type="tel" class="form-control custom-input" placeholder="O teu número">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Data de Nascimento</label>
            <input type="text" class="form-control custom-input" placeholder="20/04/2000" value="20/04/2000">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Cidade</label>
            <input type="text" class="form-control custom-input" placeholder="Aveiro" value="Aveiro">
        </div>

        <div class="form-group mb-4">
            <label class="form-label">Competências</label>
            <textarea class="form-control custom-textarea" rows="2">Criatividade, Eficiência, Pontualidade, Flexibilidade...</textarea>
        </div>

        <div class="form-group mb-4">
            <label class="form-label">Interesses</label>
            <div class="tags-container justify-content-start mb-3">
                <span class="tag-pill">Limpeza</span>
                <span class="tag-pill">Banco Alimentar</span>
                <span class="tag-pill">Natureza</span>
            </div>
            <div class="text-center">
                <button type="button" class="btn-ver-mais">+ Adicionar interesse</button>
            </div>
        </div>

        <div class="text-center mt-5 mb-5 pb-5">
            <button type="button" class="btn-guardar">Guardar alterações</button>
        </div>
    </form>
</main>

<nav>
    <img src="../../imgs/NOME_ICONE_FOGUETAO.png" alt="Foguetão">
    <img src="../../imgs/NOME_ICONE_CASA.png" alt="Casa">
    <img src="../../imgs/NOME_ICONE_CIRCULO.png" alt="Círculo Logo">
    <img src="../../imgs/NOME_ICONE_PESSOAS.png" alt="Pessoas">
</nav>

<div class="floating-fab">
    <i class="far fa-user"></i>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
